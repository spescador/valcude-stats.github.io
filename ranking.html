<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rankings · Valcude Stats</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#16a34a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Valcude Stats">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Sortable headers ─────────────────────────── */
    th.sortable {
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th.sortable:hover { background: var(--card2); }

    th.sort-desc .sort-icon::after { content: ' ↓'; color: var(--accent); }
    th.sort-asc  .sort-icon::after { content: ' ↑'; color: var(--accent); }
    th.sort-none .sort-icon::after { content: ' ↕'; color: var(--text2); opacity: .4; }

    .sort-icon { font-size: .75em; }

    /* ── Secondary stat (percentage below fraction) ─ */
    td.num small {
      font-size: .72rem;
      color: var(--text2);
    }

    /* ── Three-col chart row ─────────────────────── */
    .three-col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }
    @media (max-width: 900px) {
      .three-col { grid-template-columns: 1fr; }
    }

    /* ── Chart panel ─────────────────────────────── */
    .chart-panel {
      margin-top: 1.5rem;
    }
    .chart-panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .chart-panel .panel-header h2 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
    }
    .chart-wrap {
      padding: 1rem;
      position: relative;
      height: 420px;
    }

    /* ── Tabla compacta en móvil para evitar scroll horizontal ── */
    @media (max-width: 640px) {
      #rankTable thead th,
      #rankTable tbody td {
        padding: .35rem .3rem;
        font-size: .78rem;
      }
      #rankTable .player-name a {
        display: block;
        max-width: 90px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    }

    /* ── Tabs de columnas (Puntos / Tiro) — solo móvil ── */
    #rankTable.view-pts  .v-tiro { display: none; }
    #rankTable.view-tiro .v-pts  { display: none; }

    /* ── Desktop: todas las columnas visibles, sin tabs ── */
    @media (min-width: 641px) {
      #viewTabs { display: none; }
      #rankTable .v-tiro,
      #rankTable .v-pts  { display: table-cell !important; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">🏀 <span>Valcude</span> Stats</div>
  <div class="nav-links">
    <a href="index.html">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg>
      Dashboard
    </a>
    <a href="ranking.html" class="active">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="9" width="4" height="9" rx="1"/><rect x="8" y="4" width="4" height="14" rx="1"/><rect x="14" y="12" width="4" height="6" rx="1"/></svg>
      Rankings
    </a>
    <span class="nav-sep"></span>
    <a href="import.html" class="nav-admin">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="9" width="12" height="9" rx="2"/><path d="M7 9V6.5a3 3 0 016 0V9"/></svg>
      Admin
    </a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Rankings</h1>
    <p id="subtitle">Cargando…</p>
  </div>

  <div class="filters">
    <select id="teamFilter">
      <option value="">Todos los equipos</option>
    </select>
    <select id="playerFilter">
      <option value="">Todas las jugadoras</option>
    </select>
  </div>

  <!-- Tabla -->
  <div class="panel">
    <div class="panel-header">
      <h2>Ranking por jugadora</h2>
      <div class="tabs" id="viewTabs">
        <button class="tab active" data-view="pts">Puntos</button>
        <button class="tab" data-view="tiro">Tiro</button>
      </div>
    </div>
    <div class="table-wrap">
      <table id="rankTable" class="view-pts">
        <thead>
          <tr>
            <th>#</th>
            <th class="sortable sort-none" data-col="name">Jugadora<span class="sort-icon"></span></th>
            <th class="sortable sort-none hide-mobile" data-col="team">Equipo<span class="sort-icon"></span></th>
            <th class="sortable sort-none num v-pts" data-col="games">PJ<span class="sort-icon"></span></th>
            <th class="sortable sort-desc num v-pts" data-col="avg_pts">PTS<span class="sort-icon"></span></th>
            <th class="sortable sort-none num v-tiro" data-col="fg2_made">TC2<span class="sort-icon"></span></th>
            <th class="sortable sort-none num v-tiro" data-col="fg3_made">TC3<span class="sort-icon"></span></th>
            <th class="sortable sort-none num v-tiro" data-col="ft_made">TL<span class="sort-icon"></span></th>
            <th class="sortable sort-none num v-tiro" data-col="ft_pct_n">%TL<span class="sort-icon"></span></th>
            <th class="sortable sort-none num v-pts hide-mobile" data-col="avg_fc">FC<span class="sort-icon"></span></th>
            <th class="sortable sort-none num v-pts" data-col="perMin_pts">Pts/min<span class="sort-icon"></span></th>
          </tr>
        </thead>
        <tbody id="rankBody">
          <tr><td colspan="11" class="loading"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Gráficos -->
  <div class="three-col" style="margin-top:1.5rem">

    <div class="panel chart-panel" style="margin-top:0">
      <div class="panel-header">
        <h2 id="chartTitle">Top jugadoras</h2>
      </div>
      <div class="chart-wrap">
        <canvas id="rankChart"></canvas>
      </div>
    </div>

    <div class="panel chart-panel" style="margin-top:0">
      <div class="panel-header">
        <h2>Puntos por minuto</h2>
      </div>
      <div class="chart-wrap">
        <canvas id="ppmChart"></canvas>
      </div>
    </div>

    <div class="panel chart-panel" style="margin-top:0">
      <div class="panel-header">
        <h2>Triples anotados</h2>
      </div>
      <div class="chart-wrap">
        <canvas id="fg3Chart"></canvas>
      </div>
    </div>

  </div>

</div>

<!-- Chart.js (UMD, antes del módulo) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

<script type="module">
import { getClient, getTeams } from './js/db.js'
import { aggregateStats, fmt, titleCase, shortName } from './js/utils.js'
import { requirePin } from './js/pin.js'
import { updateNavAuth } from './js/auth.js'

requirePin()
updateNavAuth()

/* ── Metadatos por columna ────────────────────────────── */
const COL_META = {
  avg_pts:    { label: 'Puntos por partido',        scale: 1,   dec: 1 },
  avg_fg2:    { label: 'Canastas de 2 por partido',  scale: 1,   dec: 1 },
  avg_fg3:    { label: 'Triples por partido',        scale: 1,   dec: 1 },
  fg2_made:   { label: 'Canastas de 2 anotadas',    scale: 1,   dec: 0 },
  fg3_made:   { label: 'Triples anotados',           scale: 1,   dec: 0 },
  fg2_pct_n:  { label: '% Tiros de 2',             scale: 100, dec: 1 },
  fg3_pct_n:  { label: '% Triples',                scale: 100, dec: 1 },
  ft_pct_n:   { label: '% Tiros libres',           scale: 100, dec: 1 },
  avg_fc:     { label: 'Faltas cometidas / partido', scale: 1,  dec: 1 },
  perMin_pts: { label: 'Puntos por minuto',         scale: 1,   dec: 3 },
  games:      { label: 'Partidos jugados',          scale: 1,   dec: 0 },
}

let allPlayers       = []
let allTeams         = []
let selectedTeamId   = null
let selectedPlayerId = null
let sortCol        = 'avg_pts'
let sortDir        = 'desc'
let chartCol       = 'avg_pts'   // columna activa del gráfico (solo numéricas)
let chart          = null
let chartPpm       = null
let chartFg3       = null

/* ── Carga datos ──────────────────────────────────────── */
async function loadData() {
  const sb = getClient()
  // Paginación: PostgREST tiene max 1000 filas por petición en el tier free
  const PAGE = 1000
  let allData = []
  let from = 0
  while (true) {
    let q = sb.from('player_stats').select(`
      player_id, team_id, minutes, points,
      fg2_made, fg2_attempted,
      fg3_made, fg3_attempted,
      ft_made,  ft_attempted,
      fouls_committed,
      player:player_id (id, name, team:team_id (id, name))
    `).range(from, from + PAGE - 1)
    if (selectedTeamId) q = q.eq('team_id', selectedTeamId)
    const { data, error } = await q
    if (error) throw error
    allData = allData.concat(data)
    if (data.length < PAGE) break
    from += PAGE
  }

  const byPlayer = {}
  for (const r of allData) {
    const pid = r.player_id
    if (!byPlayer[pid]) byPlayer[pid] = { player: r.player, rows: [] }
    byPlayer[pid].rows.push(r)
  }

  allPlayers = Object.values(byPlayer)
    .map(p => {
      const s = aggregateStats(p.rows)
      const g = s.games
      return {
        player:        p.player,
        games:         g,
        avg_pts:       s.avg_pts,
        avg_min:       s.avg_min,
        fg2_made:      s.fg2_made,
        fg2_attempted: s.fg2_attempted,
        avg_fg2:       s.fg2_made / g,
        fg2_pct:       s.fg2_pct,
        fg2_pct_n:     s.fg2_attempted ? s.fg2_made / s.fg2_attempted : null,
        fg3_made:      s.fg3_made,
        fg3_attempted: s.fg3_attempted,
        avg_fg3:       s.fg3_made / g,
        fg3_pct:       s.fg3_pct,
        fg3_pct_n:     s.fg3_attempted ? s.fg3_made / s.fg3_attempted : null,
        ft_made:       s.ft_made,
        ft_attempted:  s.ft_attempted,
        ft_pct:        s.ft_pct,
        ft_pct_n:      s.ft_attempted ? s.ft_made / s.ft_attempted : null,
        avg_fc:        s.fouls_committed / g,
        perMin_pts:    s.perMin_pts,
      }
    })
    .filter(p => p.games > 0)
}

/* ── Poblar selector de jugadoras ─────────────────────── */
function populatePlayerFilter() {
  const sel = document.getElementById('playerFilter')
  sel.innerHTML = '<option value="">Todas las jugadoras</option>'
  const sorted = [...allPlayers].sort((a, b) =>
    (a.player?.name || '').localeCompare(b.player?.name || '', 'es')
  )
  for (const p of sorted) {
    const opt = document.createElement('option')
    opt.value = p.player.id
    opt.textContent = titleCase(p.player.name)
    sel.appendChild(opt)
  }
  sel.value = ''
  selectedPlayerId = null
}

/* ── Render tabla ─────────────────────────────────────── */
function sortedPlayers() {
  const players = selectedPlayerId
    ? allPlayers.filter(p => p.player.id === selectedPlayerId)
    : allPlayers
  return [...players].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol]
    if (sortCol === 'name') { av = a.player?.name || ''; bv = b.player?.name || '' }
    if (sortCol === 'team') { av = a.player?.team?.name || ''; bv = b.player?.team?.name || '' }
    if (typeof av === 'string') {
      return sortDir === 'asc' ? av.localeCompare(bv, 'es') : bv.localeCompare(av, 'es')
    }
    if (av == null && bv == null) return 0
    if (av == null) return 1
    if (bv == null) return -1
    return sortDir === 'asc' ? av - bv : bv - av
  })
}

function renderTable() {
  const sorted = sortedPlayers()

  const html = sorted.map((p, i) => {
    // TC2/TC3: totales sin decimales ni %; TL: totales + porcentaje
    const fg2Str = `${p.fg2_made}`
    const fg3Str = `${p.fg3_made}`
    const ftStr  = `${p.ft_made}/${p.ft_attempted}`

    return `<tr>
      <td class="rank">${i + 1}</td>
      <td class="player-name"><a href="player.html?id=${p.player.id}">${titleCase(p.player.name)}</a></td>
      <td class="team-name hide-mobile">${titleCase(p.player.team?.name || '')}</td>
      <td class="num v-pts">${p.games}</td>
      <td class="num highlight v-pts"><strong>${fmt(p.avg_pts, 1)}</strong></td>
      <td class="num v-tiro"><strong>${fg2Str}</strong></td>
      <td class="num v-tiro"><strong>${fg3Str}</strong></td>
      <td class="num v-tiro"><strong>${ftStr}</strong></td>
      <td class="num v-tiro"><small>${p.ft_pct}</small></td>
      <td class="num v-pts hide-mobile">${fmt(p.avg_fc, 1)}</td>
      <td class="num v-pts">${p.perMin_pts != null ? fmt(p.perMin_pts, 3) : '—'}</td>
    </tr>`
  }).join('')

  document.getElementById('rankBody').innerHTML =
    html || '<tr><td colspan="11" class="empty">Sin datos</td></tr>'

  // Indicadores de ordenación
  document.querySelectorAll('#rankTable th.sortable').forEach(th => {
    const col = th.dataset.col
    th.classList.remove('sort-asc', 'sort-desc', 'sort-none')
    th.classList.add(col === sortCol
      ? (sortDir === 'asc' ? 'sort-asc' : 'sort-desc')
      : 'sort-none'
    )
  })

  // Subtítulo
  const teamName = selectedTeamId
    ? titleCase(allTeams.find(t => t.id === selectedTeamId)?.name || '')
    : 'Todos los equipos'
  document.getElementById('subtitle').textContent =
    `${teamName} · ${sorted.length} jugadora${sorted.length !== 1 ? 's' : ''}`

  renderChart()
  renderPpmChart()
  renderFg3Chart()
}

/* ── Helper: construir gráfico de barras horizontal ────── */
function buildBarChart(canvasId, labels, values, label, tickFmt) {
  const style  = getComputedStyle(document.documentElement)
  const accent = style.getPropertyValue('--accent').trim() || '#16a34a'
  const text2  = style.getPropertyValue('--text2').trim()  || '#6b7280'
  const border = style.getPropertyValue('--border').trim() || '#374151'

  const ctx = document.getElementById(canvasId).getContext('2d')
  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label,
        data: values,
        backgroundColor: accent + 'bb',
        borderColor: accent,
        borderWidth: 1,
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' ' + tickFmt(ctx.parsed.x) } }
      },
      scales: {
        x: {
          beginAtZero: true,
          grid:  { color: border },
          ticks: { color: text2, callback: tickFmt }
        },
        y: {
          grid:  { display: false },
          ticks: { color: text2, font: { size: 12 } }
        }
      }
    }
  })
}

/* ── Render gráfico (columna activa) ─────────────────── */
function renderChart() {
  const meta = COL_META[chartCol]
  if (!meta || !allPlayers.length) return

  const top = [...allPlayers]
    .filter(p => p[chartCol] != null)
    .sort((a, b) => (b[chartCol] || 0) - (a[chartCol] || 0))
    .slice(0, 15)

  const labels  = top.map(p => shortName(p.player.name))
  const values  = top.map(p => parseFloat((p[chartCol] * meta.scale).toFixed(meta.dec)))
  const tickFmt = v => meta.scale === 100 ? Number(v).toFixed(meta.dec) + '%' : Number(v).toFixed(meta.dec)

  document.getElementById('chartTitle').textContent = meta.label

  if (chart) {
    chart.data.labels            = labels
    chart.data.datasets[0].data  = values
    chart.data.datasets[0].label = meta.label
    chart.options.scales.x.ticks.callback = tickFmt
    chart.options.plugins.tooltip.callbacks.label = ctx => ' ' + tickFmt(ctx.parsed.x)
    chart.update('active')
  } else {
    chart = buildBarChart('rankChart', labels, values, meta.label, tickFmt)
  }
}

/* ── Render gráfico fijo: Pts/min ────────────────────── */
function renderPpmChart() {
  if (!allPlayers.length) return

  const top = [...allPlayers]
    .filter(p => p.perMin_pts != null)
    .sort((a, b) => (b.perMin_pts || 0) - (a.perMin_pts || 0))
    .slice(0, 15)

  const labels  = top.map(p => shortName(p.player.name))
  const values  = top.map(p => parseFloat(p.perMin_pts.toFixed(3)))
  const tickFmt = v => Number(v).toFixed(3)

  if (chartPpm) {
    chartPpm.data.labels           = labels
    chartPpm.data.datasets[0].data = values
    chartPpm.update('active')
  } else {
    chartPpm = buildBarChart('ppmChart', labels, values, 'Puntos por minuto', tickFmt)
  }
}

/* ── Render gráfico fijo: Triples anotados ───────────── */
function renderFg3Chart() {
  if (!allPlayers.length) return

  const top = [...allPlayers]
    .filter(p => p.fg3_made != null)
    .sort((a, b) => (b.fg3_made || 0) - (a.fg3_made || 0))
    .slice(0, 15)

  const labels  = top.map(p => shortName(p.player.name))
  const values  = top.map(p => p.fg3_made)
  const tickFmt = v => Number(v).toFixed(0)

  if (chartFg3) {
    chartFg3.data.labels           = labels
    chartFg3.data.datasets[0].data = values
    chartFg3.update('active')
  } else {
    chartFg3 = buildBarChart('fg3Chart', labels, values, 'Triples anotados', tickFmt)
  }
}

/* ── Init ─────────────────────────────────────────────── */
async function init() {
  allTeams = await getTeams()

  const teamSel = document.getElementById('teamFilter')
  for (const t of allTeams) {
    const opt = document.createElement('option')
    opt.value = t.id
    opt.textContent = titleCase(t.name)
    teamSel.appendChild(opt)
  }

  await loadData()
  populatePlayerFilter()
  renderTable()
}

/* ── Eventos ──────────────────────────────────────────── */
/* ── Tabs de vista (Puntos / Tiro) ────────────────────── */
document.getElementById('viewTabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab')
  if (!btn) return
  document.querySelectorAll('#viewTabs .tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  document.getElementById('rankTable').className = `view-${btn.dataset.view}`
})

document.getElementById('rankTable').addEventListener('click', e => {
  const th = e.target.closest('th.sortable')
  if (!th) return
  const col = th.dataset.col
  if (col === sortCol) {
    sortDir = sortDir === 'desc' ? 'asc' : 'desc'
  } else {
    sortCol = col
    sortDir = (col === 'name' || col === 'team') ? 'asc' : 'desc'
    if (COL_META[col]) chartCol = col   // actualizar gráfico solo en columnas numéricas
  }
  renderTable()
})

document.getElementById('teamFilter').addEventListener('change', async e => {
  selectedTeamId = e.target.value ? Number(e.target.value) : null
  document.getElementById('rankBody').innerHTML =
    '<tr><td colspan="11" class="loading"><div class="spinner"></div></td></tr>'
  await loadData()
  populatePlayerFilter()
  renderTable()
})

document.getElementById('playerFilter').addEventListener('change', e => {
  selectedPlayerId = e.target.value ? Number(e.target.value) : null
  renderTable()
})

init().catch(console.error)
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(() => {})
  }
</script>
</body>
