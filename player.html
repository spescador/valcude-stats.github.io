<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jugadora — Valcude Stats</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#16a34a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Valcude Stats">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <div class="nav-logo">🏀 <span>Valcude</span> Stats</div>
  <div class="nav-links">
    <a href="index.html">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg>
      Dashboard
    </a>
    <a href="ranking.html">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="9" width="4" height="9" rx="1"/><rect x="8" y="4" width="4" height="14" rx="1"/><rect x="14" y="12" width="4" height="6" rx="1"/></svg>
      Rankings
    </a>
    <span class="nav-sep"></span>
    <a href="import.html" class="nav-admin">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="9" width="12" height="9" rx="2"/><path d="M7 9V6.5a3 3 0 016 0V9"/></svg>
      Admin
    </a>
  </div>
</nav>

<div class="page">
  <div id="content"><div class="loading"><div class="spinner"></div></div></div>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

<script type="module">
import { getPlayers, getPlayerFull, getLeaderboard } from './js/db.js'
import { updateNavAuth } from './js/auth.js'
import { fmt, fmtPct, titleCase, formatMinutes, aggregateStats } from './js/utils.js'
import { requirePin } from './js/pin.js'

requirePin()
updateNavAuth()

const params   = new URLSearchParams(location.search)
const playerId = params.get('id')

async function init() {
  const content = document.getElementById('content')

  if (!playerId) {
    // Lista de jugadoras agrupada por equipo
    const players = await getPlayers()
    const byTeam  = {}
    for (const p of players) {
      const tname = p.team?.name || 'Sin equipo'
      if (!byTeam[tname]) byTeam[tname] = []
      byTeam[tname].push(p)
    }
    content.innerHTML = `
      <div class="page-header">
        <h1>Jugadoras</h1>
        <p>${players.length} jugadoras registradas</p>
      </div>
      ${Object.entries(byTeam).sort(([a],[b]) => a.localeCompare(b)).map(([team, ps]) => `
        <div class="panel" style="margin-bottom:1rem">
          <div class="panel-header"><h2>${titleCase(team)}</h2></div>
          <div class="table-wrap"><table>
            <thead><tr><th>Jugadora</th></tr></thead>
            <tbody>
              ${ps.map(p => `<tr><td><a href="player.html?id=${p.id}">${titleCase(p.name)}</a></td></tr>`).join('')}
            </tbody>
          </table></div>
        </div>`).join('')}
    `
    return
  }

  // Perfil de jugadora
  const { player, stats: rawStats } = await getPlayerFull(playerId)

  // Ordenar por jornada (de menor a mayor)
  const stats = [...rawStats].sort((a, b) =>
    (a.match?.jornada || 999) - (b.match?.jornada || 999)
  )

  const agg = aggregateStats(stats)
  if (!agg) {
    content.innerHTML = '<div class="empty">Sin datos para esta jugadora</div>'
    return
  }

  // Calcular posición en el ranking para cada métrica
  let ranks = {}
  try {
    const lb = await getLeaderboard()
    for (const metric of ['avg_pts', 'avg_val', 'avg_min', 'perMin_pts']) {
      const sorted = [...lb]
        .filter(p => p[metric] != null)
        .sort((a, b) => (b[metric] || 0) - (a[metric] || 0))
      const pos = sorted.findIndex(p => p.player?.id === Number(playerId))
      if (pos >= 0) ranks[metric] = pos + 1
    }
  } catch (_) {}

  const lastJersey = stats[stats.length - 1]?.jersey_number || '—'

  content.innerHTML = `
    <div class="page-header"><p><a href="javascript:history.back()">← Volver</a></p></div>

    <div class="player-header">
      <div class="player-number">#${lastJersey}</div>
      <div class="player-info">
        <h1>${titleCase(player.name)}</h1>
        <div class="team">${titleCase(player.team?.name || '')}</div>
        <div style="margin-top:.4rem;color:var(--text2);font-size:.83rem">${agg.games} partidos jugados</div>
      </div>
    </div>

    <!-- Medias -->
    <div class="player-avg-grid">
      ${avgCard('PTS', fmt(agg.avg_pts, 1), fmt(agg.perMin_pts, 2) + ' pts/min', ranks.avg_pts)}
      ${avgCard('VAL', fmt(agg.avg_val, 1), fmt(agg.perMin_val, 2) + ' val/min', ranks.avg_val)}
      ${avgCard('MIN', fmt(agg.avg_min, 1) + "'", '', ranks.avg_min)}
      ${avgCard('+/-', (agg.avg_pm > 0 ? '+' : '') + fmt(agg.avg_pm, 1), '')}
    </div>

    <!-- Porcentajes de tiro -->
    <div class="panel" style="margin-bottom:1.25rem">
      <div class="panel-header"><h2>Porcentajes de tiro</h2></div>
      <div class="panel-body">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;text-align:center">
          ${shootingCard('TC2', agg.fg2_made, agg.fg2_attempted, agg.fg2_pct)}
          ${shootingCard('TC3', agg.fg3_made, agg.fg3_attempted, agg.fg3_pct)}
          ${shootingCard('TL',  agg.ft_made,  agg.ft_attempted,  agg.ft_pct)}
        </div>
      </div>
    </div>

    <!-- Gráfico de evolución -->
    <div class="panel" style="margin-bottom:1.25rem">
      <div class="panel-header">
        <h2>Evolución por partido</h2>
        <div class="tabs" id="chartTabs">
          <button class="tab active" data-key="points"    data-label="PTS">PTS</button>
          <button class="tab"        data-key="valuation" data-label="VAL">VAL</button>
          <button class="tab"        data-key="minutes"   data-label="MIN">MIN</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="chart-container"><canvas id="evChart"></canvas></div>
      </div>
    </div>

    <!-- Game log -->
    <div class="panel">
      <div class="panel-header"><h2>Partido a partido</h2></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>J</th>
              <th>Rival</th>
              <th class="hide-mobile">Res.</th>
              <th class="num">MIN</th>
              <th class="num">PTS</th>
              <th class="num hide-tablet">TC2</th>
              <th class="num hide-tablet">TC3</th>
              <th class="num hide-tablet">TL</th>
              <th class="num">VAL</th>
              <th class="num hide-mobile" title="Puntos por minuto">Pts/min</th>
              <th class="num hide-mobile" title="Valoración por minuto">Val/min</th>
            </tr>
          </thead>
          <tbody>
            ${stats.map(s => {
              const m        = s.match
              const isMyT1   = m?.team1?.id === s.team_id
              const myScore  = isMyT1 ? m?.team1_score : m?.team2_score
              const thScore  = isMyT1 ? m?.team2_score : m?.team1_score
              const rival    = isMyT1 ? m?.team2?.name : m?.team1?.name
              const won      = myScore > thScore
              const min      = Number(s.minutes)
              const hasMin   = min > 0.5
              return `<tr>
                <td><a href="match.html?id=${m?.id}">${m?.jornada || '?'}</a></td>
                <td style="max-width:110px;overflow:hidden;text-overflow:ellipsis">${titleCase(rival || '')}</td>
                <td class="hide-mobile">
                  <span class="badge ${won ? 'badge-win' : 'badge-loss'}">${won ? 'V' : 'D'} ${myScore}-${thScore}</span>
                </td>
                <td class="num">${formatMinutes(min)}</td>
                <td class="num highlight"><strong>${s.points}</strong></td>
                <td class="num hide-tablet">${s.fg2_made}/${s.fg2_attempted}</td>
                <td class="num hide-tablet">${s.fg3_made}/${s.fg3_attempted}</td>
                <td class="num hide-tablet">${s.ft_made}/${s.ft_attempted}</td>
                <td class="num">${s.valuation}</td>
                <td class="num hide-mobile" style="color:var(--text2)">${hasMin ? fmt(s.points    / min, 2) : '—'}</td>
                <td class="num hide-mobile" style="color:var(--text2)">${hasMin ? fmt(s.valuation / min, 2) : '—'}</td>
              </tr>`
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `

  // Gráfico inicial
  let chart = buildChart(stats, 'points', 'PTS')

  document.getElementById('chartTabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab')
    if (!btn) return
    document.querySelectorAll('#chartTabs .tab').forEach(t => t.classList.remove('active'))
    btn.classList.add('active')
    chart.destroy()
    chart = buildChart(stats, btn.dataset.key, btn.dataset.label)
  })
}

function avgCard(label, main, sub, rank) {
  return `<div class="stat-card">
    <div class="label">${label}</div>
    <div class="value">${main}</div>
    ${rank != null ? `<div class="rank-pos">#${rank}</div>` : ''}
    ${sub ? `<div class="sub" style="color:var(--accent);font-weight:600">${sub}</div>` : ''}
  </div>`
}

function shootingCard(label, made, attempted, pct) {
  return `<div>
    <div style="font-size:1.5rem;font-weight:700">${pct || '—'}</div>
    <div style="color:var(--text2);font-size:.8rem;margin-top:.2rem">${label} · ${made}/${attempted}</div>
  </div>`
}

function buildChart(stats, key, label) {
  // Stats ya ordenados por jornada (J1 → J15...)
  const labels = stats.map(s => `J${s.match?.jornada || '?'}`)
  const values = stats.map(s => Number(s[key]) || 0)
  const avg    = values.reduce((a, b) => a + b, 0) / (values.length || 1)

  const ctx = document.getElementById('evChart').getContext('2d')
  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label,
          data: values,
          backgroundColor: 'rgba(22,163,74,.6)',
          borderColor:     'rgba(21,128,61,.9)',
          borderWidth: 1,
          borderRadius: 4,
        },
        {
          label: 'Media',
          data: values.map(() => avg),
          type: 'line',
          borderColor:   'rgba(21,128,61,.45)',
          borderDash:    [5, 4],
          borderWidth:   2,
          pointRadius:   0,
          fill:          false,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: { color: '#527252', font: { size: 11 } },
          grid:  { color: 'rgba(0,0,0,.06)' },
        },
        y: {
          ticks: { color: '#527252', font: { size: 11 } },
          grid:  { color: 'rgba(0,0,0,.06)' },
          beginAtZero: true,
        },
      },
    },
  })
}

init().catch(console.error)
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(() => {})
  }
</script>
</body>
</html>
