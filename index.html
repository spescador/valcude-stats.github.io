<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valcude Stats</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#16a34a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Valcude Stats">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <div class="nav-logo">🏀 <span>Valcude</span> Stats</div>
  <div class="nav-links">
    <a href="index.html" class="active">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg>
      Dashboard
    </a>
    <a href="ranking.html">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="9" width="4" height="9" rx="1"/><rect x="8" y="4" width="4" height="14" rx="1"/><rect x="14" y="12" width="4" height="6" rx="1"/></svg>
      Rankings
    </a>
    <span class="nav-sep"></span>
    <a href="import.html" class="nav-admin">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="9" width="12" height="9" rx="2"/><path d="M7 9V6.5a3 3 0 016 0V9"/></svg>
      Admin
    </a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Dashboard</h1>
    <p id="subtitle">Cargando datos…</p>
  </div>

  <!-- Filtro de equipo -->
  <div class="filters">
    <select id="teamFilter">
      <option value="">Todos los equipos</option>
    </select>
  </div>

  <!-- Tarjetas de resumen -->
  <div class="stat-grid" id="statCards">
    <div class="stat-card"><div class="label">Partidos</div><div class="value" id="c-games">—</div></div>
    <div class="stat-card"><div class="label">Victorias</div><div class="value result-win" id="c-wins">—</div><div class="sub" id="c-record"></div></div>
    <div class="stat-card"><div class="label">Pts/partido</div><div class="value" id="c-ppg">—</div></div>
    <div class="stat-card"><div class="label">Val/partido</div><div class="value" id="c-vpg">—</div></div>
  </div>

  <div class="two-col">
    <!-- Leaderboard -->
    <div class="panel">
      <div class="panel-header">
        <h2>Ranking de jugadoras</h2>
        <div class="tabs" id="leaderTabs">
          <button class="tab active" data-stat="avg_pts" data-dec="1">PTS</button>
          <button class="tab" data-stat="avg_val" data-dec="1">VAL</button>
          <button class="tab" data-stat="perMin_pts" data-dec="2">Pts/min</button>
          <button class="tab" data-stat="perMin_val" data-dec="2">Val/min</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Jugadora</th>
              <th class="hide-mobile">Equipo</th>
              <th class="num hide-mobile">PJ</th>
              <th class="num" id="th-main">PTS</th>
              <th class="num hide-mobile">MIN</th>
            </tr>
          </thead>
          <tbody id="leaderBody">
            <tr><td colspan="6" class="loading"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Lista de partidos -->
    <div class="panel">
      <div class="panel-header"><h2>Partidos</h2></div>
      <div id="matchList"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<script type="module">
import { getMatches, getLeaderboard, getTeams } from './js/db.js'
import { updateNavAuth } from './js/auth.js'
import { fmt, titleCase } from './js/utils.js'
import { requirePin } from './js/pin.js'

requirePin()
updateNavAuth()

let allMatches    = []
let leaderboard   = []
let allTeams      = []
let selectedTeamId = null
let currentStat    = 'avg_pts'
let currentDec     = 1

async function init() {
  const [teams, matches, leaders] = await Promise.all([
    getTeams(),
    getMatches(),
    getLeaderboard(),
  ])

  allTeams    = teams
  allMatches  = matches
  leaderboard = leaders

  // Selector de equipo
  const sel = document.getElementById('teamFilter')
  for (const t of teams) {
    const opt = document.createElement('option')
    opt.value = t.id
    opt.textContent = titleCase(t.name)
    sel.appendChild(opt)
  }

  // Default: primer Valcude encontrado
  const valcude = teams.find(t => t.name === 'VALCUDE ALCOBENDAS')
  if (valcude) {
    sel.value = valcude.id
    selectedTeamId = valcude.id
  }

  render()
}

/* ── Filtros ─────────────────────────────────────────── */
function filteredMatches() {
  if (!selectedTeamId) return allMatches
  return allMatches.filter(m =>
    m.team1?.id === selectedTeamId || m.team2?.id === selectedTeamId
  )
}

function filteredLeaderboard() {
  if (!selectedTeamId) return leaderboard
  return leaderboard.filter(p => p.player?.team?.id === selectedTeamId)
}

/* ── Render ──────────────────────────────────────────── */
function render() {
  const matches = filteredMatches()
  const leaders = filteredLeaderboard()

  // Summary cards
  let wins = 0, totalPts = 0
  for (const m of matches) {
    if (selectedTeamId) {
      const isT1  = m.team1?.id === selectedTeamId
      const myPts = isT1 ? m.team1_score : m.team2_score
      const thPts = isT1 ? m.team2_score : m.team1_score
      if (myPts > thPts) wins++
      totalPts += myPts || 0
    }
  }

  const teamName = selectedTeamId
    ? titleCase(allTeams.find(t => t.id === selectedTeamId)?.name || '')
    : 'Todos los equipos'

  document.getElementById('subtitle').textContent =
    `${teamName} · ${matches.length} partido${matches.length !== 1 ? 's' : ''} · ${matches[0]?.competition?.name || ''} ${matches[0]?.competition?.season || ''}`

  document.getElementById('c-games').textContent = matches.length
  document.getElementById('c-wins').textContent  = selectedTeamId ? wins : '—'
  document.getElementById('c-record').textContent = selectedTeamId && matches.length
    ? `${wins}V – ${matches.length - wins}D`
    : ''
  document.getElementById('c-ppg').textContent = selectedTeamId && matches.length
    ? fmt(totalPts / matches.length, 1)
    : '—'

  // Val/partido = media de avg_val de jugadoras del equipo
  const avgVal = leaders.length
    ? leaders.reduce((s, p) => s + (p.avg_val || 0), 0) / leaders.length
    : null
  document.getElementById('c-vpg').textContent = avgVal != null ? fmt(avgVal, 1) : '—'

  renderLeader(leaders)
  renderMatches(matches)
}

function renderLeader(leaders) {
  document.getElementById('th-main').textContent =
    document.querySelector('#leaderTabs .tab.active')?.textContent || 'PTS'

  const sorted = [...leaders]
    .filter(p => p[currentStat] != null)
    .sort((a, b) => (b[currentStat] || 0) - (a[currentStat] || 0))

  const rows = sorted.map((p, i) => {
    const val = p[currentStat]
    return `<tr>
      <td class="rank">${i + 1}</td>
      <td class="player-name"><a href="player.html?id=${p.player.id}">${titleCase(p.player.name)}</a></td>
      <td class="team-name hide-mobile">${titleCase(p.player.team?.name || '')}</td>
      <td class="num hide-mobile">${p.games}</td>
      <td class="num highlight"><strong>${fmt(val, currentDec)}</strong></td>
      <td class="num hide-mobile">${fmt(p.avg_min, 1)}'</td>
    </tr>`
  }).join('')

  document.getElementById('leaderBody').innerHTML =
    rows || '<tr><td colspan="6" class="empty">Sin datos</td></tr>'
}

function renderMatches(matches) {
  const html = matches.map(m => {
    const isT1     = m.team1?.id === selectedTeamId
    const myScore  = selectedTeamId ? (isT1 ? m.team1_score : m.team2_score) : m.team1_score
    const thScore  = selectedTeamId ? (isT1 ? m.team2_score : m.team1_score) : m.team2_score
    const myTeam   = selectedTeamId ? (isT1 ? m.team1 : m.team2)  : m.team1
    const rival    = selectedTeamId ? (isT1 ? m.team2 : m.team1)  : m.team2
    const won      = selectedTeamId && myScore > thScore
    const cls      = selectedTeamId ? (won ? 'result-win' : 'result-loss') : ''
    return `<a class="match-item" href="match.html?id=${m.id}">
      <span class="match-jornada">J${m.jornada || '?'}</span>
      <span class="match-teams">
        <strong>${titleCase(myTeam?.name || '')}</strong>
        <span class="rival"> vs ${titleCase(rival?.name || '')}</span>
      </span>
      <span class="match-score ${cls}">${myScore ?? '?'}–${thScore ?? '?'}</span>
    </a>`
  }).join('')

  document.getElementById('matchList').innerHTML =
    html || '<div class="empty">Sin partidos</div>'
}

/* ── Eventos ─────────────────────────────────────────── */
document.getElementById('leaderTabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab')
  if (!btn) return
  document.querySelectorAll('#leaderTabs .tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  currentStat = btn.dataset.stat
  currentDec  = Number(btn.dataset.dec) || 1
  renderLeader(filteredLeaderboard())
})

document.getElementById('teamFilter').addEventListener('change', e => {
  selectedTeamId = e.target.value ? Number(e.target.value) : null
  render()
})

init().catch(console.error)
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(() => {})
  }
</script>
</body>
</html>
