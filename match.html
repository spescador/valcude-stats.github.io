<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partido — Valcude Stats</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#16a34a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Valcude Stats">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <div class="nav-logo">🏀 <span>Valcude</span> Stats</div>
  <div class="nav-links">
    <a href="index.html">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg>
      Dashboard
    </a>
    <a href="ranking.html">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="9" width="4" height="9" rx="1"/><rect x="8" y="4" width="4" height="14" rx="1"/><rect x="14" y="12" width="4" height="6" rx="1"/></svg>
      Rankings
    </a>
    <span class="nav-sep"></span>
    <a href="import.html" class="nav-admin">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="9" width="12" height="9" rx="2"/><path d="M7 9V6.5a3 3 0 016 0V9"/></svg>
      Admin
    </a>
  </div>
</nav>

<div class="page">
  <div id="content"><div class="loading"><div class="spinner"></div></div></div>
</div>

<script type="module">
import { getMatches, getMatch } from './js/db.js'
import { updateNavAuth } from './js/auth.js'
import { fmt, fmtPct, titleCase, formatMinutes } from './js/utils.js'
import { requirePin } from './js/pin.js'

requirePin()
updateNavAuth()

const params  = new URLSearchParams(location.search)
const matchId = params.get('id')

async function init() {
  const content = document.getElementById('content')

  if (!matchId) {
    // Lista de partidos
    const matches = await getMatches()
    content.innerHTML = `
      <div class="page-header">
        <h1>Partidos</h1>
        <p>${matches.length} partidos registrados</p>
      </div>
      <div class="panel">
        ${matches.map(m => {
          const isV1      = m.team1?.name?.includes('VALCUDE')
          const myScore   = isV1 ? m.team1_score : m.team2_score
          const theirScore = isV1 ? m.team2_score : m.team1_score
          const rival     = isV1 ? m.team2?.name : m.team1?.name
          const won       = myScore > theirScore
          return `<a class="match-item" href="match.html?id=${m.id}">
            <span class="match-jornada">J${m.jornada || '?'}</span>
            <span class="match-teams">
              <strong>${titleCase(isV1 ? m.team1?.name : m.team2?.name)}</strong>
              <span class="rival"> vs ${titleCase(rival || '')}</span>
            </span>
            <span class="match-score ${won ? 'result-win' : 'result-loss'}">${myScore ?? '?'}–${theirScore ?? '?'}</span>
          </a>`
        }).join('')}
      </div>`
    return
  }

  // Detalle de partido
  const { match: m, stats } = await getMatch(matchId)
  const isV1       = m.team1?.name?.includes('VALCUDE')
  const team1Stats = stats.filter(s => s.team_id === m.team1.id)
  const team2Stats = stats.filter(s => s.team_id === m.team2.id)

  content.innerHTML = `
    <div class="page-header">
      <p><a href="match.html">← Todos los partidos</a></p>
      <h1 style="margin-top:.4rem">Jornada ${m.jornada || '?'}</h1>
      <p>${m.competition?.name || ''} · Temporada ${m.competition?.season || ''}</p>
    </div>

    <div class="match-header">
      <div class="competition">${m.competition?.name || ''} ${m.competition?.season || ''}</div>
      <div class="score-row">
        <div class="team-name">${titleCase(m.team1.name)}</div>
        <div class="score ${isV1 ? (m.team1_score > m.team2_score ? 'result-win' : 'result-loss') : ''}">
          ${m.team1_score ?? '?'} – ${m.team2_score ?? '?'}
        </div>
        <div class="team-name right">${titleCase(m.team2.name)}</div>
      </div>
      ${m.match_date
        ? `<div style="font-size:.82rem;color:var(--text2);margin-top:.5rem">${new Date(m.match_date).toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'})}</div>`
        : ''}
    </div>

    ${boxScore(m.team1.name, team1Stats)}
    ${boxScore(m.team2.name, team2Stats)}
  `
}

function boxScore(teamName, stats) {
  if (!stats.length) return ''
  const sorted = [...stats].sort((a, b) => b.points - a.points)

  const rows = sorted.map(s => {
    const min    = Number(s.minutes)
    const hasMin = min > 0.5
    const ppm    = hasMin ? fmt(s.points / min, 2) : '—'
    return `<tr>
      <td class="hide-mobile">${s.jersey_number || '—'}</td>
      <td class="player-name"><a href="player.html?id=${s.player.id}">${titleCase(s.player.name)}</a></td>
      <td class="num">${formatMinutes(min)}</td>
      <td class="num highlight"><strong>${s.points}</strong></td>
      <td class="num hide-tablet">${s.fg2_made}/${s.fg2_attempted}</td>
      <td class="num hide-tablet">${s.fg3_made}/${s.fg3_attempted}</td>
      <td class="num hide-tablet">${s.ft_made}/${s.ft_attempted}</td>
      <td class="num">${s.valuation}</td>
      <td class="num ${s.plus_minus > 0 ? 'result-win' : s.plus_minus < 0 ? 'result-loss' : ''}">${s.plus_minus > 0 ? '+' : ''}${s.plus_minus}</td>
      <td class="num hide-mobile" style="color:var(--text2)">${ppm}</td>
    </tr>`
  }).join('')

  // Totales
  const tot = stats.reduce((acc, s) => {
    for (const k of ['points','fg2_made','fg2_attempted','fg3_made','fg3_attempted','ft_made','ft_attempted','valuation']) {
      acc[k] = (acc[k] || 0) + (Number(s[k]) || 0)
    }
    return acc
  }, {})

  return `
    <div class="panel" style="margin-bottom:1.25rem">
      <div class="panel-header"><h2>${titleCase(teamName)}</h2></div>
      <div class="table-wrap">
        <table class="box-table">
          <colgroup>
            <col class="col-hash hide-mobile">
            <col class="col-name">
            <col class="col-min">
            <col class="col-pts">
            <col class="col-tc hide-tablet">
            <col class="col-tc hide-tablet">
            <col class="col-tc hide-tablet">
            <col class="col-val">
            <col class="col-pm">
            <col class="col-ppm hide-mobile">
          </colgroup>
          <thead>
            <tr>
              <th class="hide-mobile">#</th>
              <th>Jugadora</th>
              <th class="num">MIN</th>
              <th class="num">PTS</th>
              <th class="num hide-tablet">TC2</th>
              <th class="num hide-tablet">TC3</th>
              <th class="num hide-tablet">TL</th>
              <th class="num">VAL</th>
              <th class="num">+/-</th>
              <th class="num hide-mobile" title="Puntos por minuto">Pts/min</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
            <tr style="border-top:2px solid var(--border);font-weight:700;background:var(--card2)">
              <td class="hide-mobile" colspan="1" style="color:var(--text2);font-size:.78rem">TOT</td>
              <td style="color:var(--text2);font-size:.8rem">TOTALES</td>
              <td></td>
              <td class="num">${tot.points}</td>
              <td class="num hide-tablet">${tot.fg2_made}/${tot.fg2_attempted}</td>
              <td class="num hide-tablet">${tot.fg3_made}/${tot.fg3_attempted}</td>
              <td class="num hide-tablet">${tot.ft_made}/${tot.ft_attempted}</td>
              <td class="num">${tot.valuation}</td>
              <td></td><td class="hide-mobile"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`
}

init().catch(console.error)
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(() => {})
  }
</script>
</body>
</html>
